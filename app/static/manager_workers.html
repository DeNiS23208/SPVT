<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>SPVT — Сотрудники</title>
  <link rel="stylesheet" href="/static/css/style.css?v=39">
</head>
<body class="page-manager">
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge">Администратор</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem" id="page-title">Сотрудники</h1>
        <p class="subtitle" style="margin:6px 0 0" id="page-subtitle"></p>
      </div>
      <a class="btn btn-secondary" id="back-link" href="/manager">← К кабинету</a>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>

    <div class="card workers-filters-card">
      <h2 style="margin:0 0 14px;font-size:1.05rem">Поиск и фильтры</h2>
      <div class="workers-filters-grid">
        <div class="form-field">
          <label for="workers-filter-date">Дата смены</label>
          <input id="workers-filter-date" type="date">
        </div>
        <div class="form-field">
          <label for="workers-search">Поиск по ФИО</label>
          <input id="workers-search" type="search" autocomplete="off" placeholder="Фамилия, имя, отчество">
        </div>
        <div class="form-field">
          <label for="workers-filter-department">Подразделение</label>
          <select id="workers-filter-department">
            <option value="">Все подразделения</option>
          </select>
        </div>
        <div class="form-field">
          <label for="workers-filter-position">Должность</label>
          <select id="workers-filter-position">
            <option value="">Все должности</option>
          </select>
        </div>
        <div class="form-field">
          <label for="workers-filter-test">Тест</label>
          <select id="workers-filter-test">
            <option value="">Все тесты</option>
          </select>
        </div>
      </div>
      <button type="button" class="btn btn-secondary workers-filters-reset" id="workers-reset-filters">Сбросить фильтры</button>
    </div>

    <div class="card">
      <p class="subtitle" style="margin:0 0 16px" id="workers-count"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ФИО</th>
              <th>Должность</th>
              <th>Подразделение</th>
              <th>Тесты за смену</th>
            </tr>
          </thead>
          <tbody id="workers-body"></tbody>
        </table>
      </div>
      <p id="empty-note" class="subtitle hidden" style="margin:16px 0 0">Никого не найдено по этому фильтру.</p>
      <nav class="workers-pagination hidden" id="workers-pagination" aria-label="Страницы списка"></nav>
    </div>
  </div>

  <script src="/static/js/app.js?v=36"></script>
  <script src="/static/js/manager_workers.js?v=35"></script>
</body>
</html>
