<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>SPVT — Кабинет начальника</title>
  <link rel="stylesheet" href="/static/css/style.css?v=42">
</head>
<body class="page-manager">
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge">Администратор</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem" id="user-name">Сводка по смене</h1>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary" id="logout-btn" type="button">Выйти</button>
      </div>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>

    <div class="card">
      <div class="card-section-head">
        <h2>Тесты</h2>
        <p class="subtitle">Список тестов, которые видят работники при входе</p>
      </div>
      <div id="manager-tests-grid" class="tests-grid"></div>
      <div class="manager-tests-actions">
        <a class="btn btn-primary" href="/manager/tests/new">Добавить тест</a>
      </div>
    </div>

    <div class="card">
      <label for="shift-date">Дата смены</label>
      <div class="workers-date-wrap" id="manager-shift-date-wrap">
        <input id="shift-date" type="date">
        <button
          type="button"
          class="workers-date-clear"
          id="shift-date-clear"
          title="Показать за всё время"
          aria-label="Сбросить дату — за всё время"
        >×</button>
      </div>
      <div class="manager-toolbar-grid">
        <button class="btn btn-primary" id="refresh-btn" type="button">Обновить</button>
        <button class="btn btn-success" id="export-btn" type="button">Выгрузить для Power BI (CSV)</button>
        <button class="btn btn-danger" id="reset-btn" type="button">Сбросить тесты за дату (для проверки)</button>
      </div>
    </div>

    <div class="card">
      <h2>Статистика</h2>
      <div class="grid-2" id="stats-grid">
        <a class="stat stat-clickable" href="/manager/workers?filter=all" data-filter="all">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Всего работников</div>
        </a>
        <a class="stat stat-clickable" href="/manager/workers?filter=ready" data-filter="ready">
          <div class="stat-value" id="stat-ready">0</div>
          <div class="stat-label">Готовы</div>
        </a>
        <a class="stat stat-clickable" href="/manager/workers?filter=not_ready" data-filter="not_ready">
          <div class="stat-value" id="stat-not-ready">0</div>
          <div class="stat-label">Не готовы</div>
        </a>
        <a class="stat stat-clickable" href="/manager/workers?filter=not_started" data-filter="not_started">
          <div class="stat-value" id="stat-not-started">0</div>
          <div class="stat-label">Не проходили</div>
        </a>
      </div>
    </div>

    <div class="card">
      <h2>Результаты</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ФИО</th>
              <th>Тест</th>
              <th>Билет</th>
              <th>Балл</th>
              <th>Статус</th>
              <th class="th-actions"></th>
            </tr>
          </thead>
          <tbody id="attempts-body"></tbody>
        </table>
      </div>
      <p id="results-count" class="subtitle" style="margin:12px 0 0"></p>
      <p id="empty-note" class="subtitle hidden">Пока нет завершённых попыток за выбранную дату.</p>
      <nav class="workers-pagination hidden" id="results-pagination" aria-label="Страницы результатов"></nav>
    </div>

  </div>

  <script src="/static/js/app.js?v=38"></script>
  <script src="/static/js/site_settings.js?v=24"></script>
  <script src="/static/js/manager_tests.js?v=33"></script>
  <script>
    const token = getToken();
    const role = localStorage.getItem("spvt_role");
    if (!token || (role !== "manager" && role !== "admin")) location.href = "/";

    document.getElementById("user-name").textContent =
      localStorage.getItem("spvt_full_name") || "Администратор";

    document.getElementById("logout-btn").addEventListener("click", () => {
      clearSession();
      location.href = "/";
    });

    const shiftInput = document.getElementById("shift-date");
    const shiftDateWrap = document.getElementById("manager-shift-date-wrap");
    const shiftDateClear = document.getElementById("shift-date-clear");
    const resetBtn = document.getElementById("reset-btn");
    const errorBox = document.getElementById("error-box");
    const emptyNote = document.getElementById("empty-note");
    const resultsCountEl = document.getElementById("results-count");
    const resultsPaginationEl = document.getElementById("results-pagination");
    const RESULTS_PAGE_SIZE = 10;
    let resultsPage = Math.max(1, parseInt(new URLSearchParams(location.search).get("page") || "1", 10) || 1);

    function isAllTimeMode() {
      return shiftDateWrap.classList.contains("is-all-time");
    }

    function setAllTimeMode(on) {
      shiftDateWrap.classList.toggle("is-all-time", on);
      resetBtn.disabled = on;
      resetBtn.title = on ? "Укажите дату смены для сброса" : "";
    }

    function formatDateParam() {
      return isAllTimeMode() ? "all" : shiftInput.value;
    }

    const urlDate = (new URLSearchParams(location.search).get("date") || "").trim().toLowerCase();
    if (urlDate === "all") {
      shiftInput.value = "";
      setAllTimeMode(true);
    } else if (urlDate) {
      shiftInput.valueAsDate = new Date(urlDate + "T12:00:00");
      setAllTimeMode(false);
    } else {
      shiftInput.valueAsDate = new Date();
      setAllTimeMode(false);
    }

    function updateStatLinks() {
      const date = formatDateParam();
      document.querySelectorAll("#stats-grid a.stat-clickable").forEach((link) => {
        const filter = link.dataset.filter || "all";
        const q = new URLSearchParams({ filter, date });
        link.href = `/manager/workers?${q.toString()}`;
      });
    }

    function syncManagerUrl() {
      const q = new URLSearchParams(location.search);
      q.set("date", formatDateParam());
      q.set("page", String(resultsPage));
      history.replaceState(null, "", `${location.pathname}?${q.toString()}`);
    }

    function goToResultsPage(nextPage) {
      resultsPage = nextPage;
      syncManagerUrl();
      loadDashboard().catch((err) => showError(errorBox, err.message));
    }

    function renderResultsPagination(data) {
      const totalPeople = data.results_people_count || 0;
      const pageSize = data.results_page_size || RESULTS_PAGE_SIZE;
      const current = data.results_page || resultsPage;
      const totalPages = Math.max(1, Math.ceil(totalPeople / pageSize));

      if (totalPeople === 0) {
        resultsCountEl.textContent = "";
        resultsPaginationEl.classList.add("hidden");
        resultsPaginationEl.innerHTML = "";
        return;
      }

      const from = (current - 1) * pageSize + 1;
      const to = Math.min(current * pageSize, totalPeople);
      resultsCountEl.textContent =
        `Сотрудников с попытками: ${totalPeople} · на странице ${from}–${to}`;

      if (totalPages <= 1) {
        resultsPaginationEl.classList.add("hidden");
        resultsPaginationEl.innerHTML = "";
        return;
      }

      resultsPaginationEl.classList.remove("hidden");
      const prevDisabled = current <= 1;
      const nextDisabled = current >= totalPages;
      resultsPaginationEl.innerHTML = `
        <button type="button" class="btn btn-secondary btn-sm" id="results-prev" ${prevDisabled ? "disabled" : ""}>← Назад</button>
        <span class="workers-pagination-info">Страница ${current} из ${totalPages}</span>
        <button type="button" class="btn btn-secondary btn-sm" id="results-next" ${nextDisabled ? "disabled" : ""}>Вперёд →</button>
      `;
      resultsPaginationEl.querySelector("#results-prev")?.addEventListener("click", () => {
        if (current > 1) goToResultsPage(current - 1);
      });
      resultsPaginationEl.querySelector("#results-next")?.addEventListener("click", () => {
        if (current < totalPages) goToResultsPage(current + 1);
      });
    }

    shiftInput.addEventListener("change", () => {
      if (shiftInput.value) setAllTimeMode(false);
      resultsPage = 1;
      updateStatLinks();
      syncManagerUrl();
    });

    shiftDateClear.addEventListener("click", async () => {
      shiftInput.value = "";
      setAllTimeMode(true);
      resultsPage = 1;
      updateStatLinks();
      syncManagerUrl();
      try {
        await loadDashboard();
      } catch (err) {
        showError(errorBox, err.message);
      }
    });

    updateStatLinks();

    async function loadDashboard() {
      hideError(errorBox);
      const date = formatDateParam();
      const q = new URLSearchParams({
        shift_date: date,
        page: String(resultsPage),
        page_size: String(RESULTS_PAGE_SIZE),
      });
      const data = await API.get(`/api/manager/dashboard?${q.toString()}`, token);
      resultsPage = data.results_page || resultsPage;

      document.getElementById("stat-total").textContent = data.total_workers;
      document.getElementById("stat-ready").textContent = data.ready;
      document.getElementById("stat-not-ready").textContent = data.not_ready;
      document.getElementById("stat-not-started").textContent = data.not_started;

      const tbody = document.getElementById("attempts-body");
      tbody.innerHTML = "";
      const emptyNote = document.getElementById("empty-note");

      emptyNote.textContent = isAllTimeMode()
        ? "Пока нет завершённых попыток."
        : "Пока нет завершённых попыток за выбранную дату.";

      renderResultsPagination(data);

      if (!data.attempts.length) {
        emptyNote.classList.remove("hidden");
        return;
      }
      emptyNote.classList.add("hidden");

      data.attempts.forEach((item) => {
        const st = attemptStatusDisplay(item);
        const tr = document.createElement("tr");
        const resetBtn = item.can_reset
          ? `<button type="button" class="btn-reset-attempt" data-attempt-id="${item.attempt_id}" title="Сбросить попытку" aria-label="Сбросить попытку">↻</button>`
          : "";
        tr.innerHTML = `
          <td>${escapeHtml(item.employee_name)}</td>
          <td>${escapeHtml(item.test_title || "—")}</td>
          <td>${escapeHtml(item.ticket_label || "—")}</td>
          <td>${item.score_percent != null ? item.score_percent + "%" : "—"}</td>
          <td class="${st.className}">${escapeHtml(st.text)}</td>
          <td class="td-actions">${resetBtn}</td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll(".btn-reset-attempt").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const attemptId = btn.dataset.attemptId;
          const row = btn.closest("tr");
          const name = row?.querySelector("td")?.textContent?.trim() || "сотрудника";
          const okReset = await confirmDialog({
            title: "Сбросить попытку?",
            message: `${name} сможет пройти тест заново.`,
            confirmText: "Сбросить",
            cancelText: "Отмена",
            danger: true,
          });
          if (!okReset) return;
          btn.disabled = true;
          try {
            await API.post(`/api/manager/attempts/${attemptId}/reset`, token, {});
            await loadDashboard();
          } catch (err) {
            showError(errorBox, err.message);
            btn.disabled = false;
          }
        });
      });
      syncManagerUrl();
    }

    document.getElementById("refresh-btn").addEventListener("click", async () => {
      try {
        await loadDashboard();
      } catch (err) {
        showError(errorBox, err.message);
      }
    });

    document.getElementById("export-btn").addEventListener("click", () => {
      const date = formatDateParam();
      const url = `/api/manager/export/powerbi?shift_date=${encodeURIComponent(date)}`;
      fetch(url, { headers: { Authorization: `Bearer ${token}` } })
        .then(async (res) => {
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || "Ошибка выгрузки");
          }
          return res.blob();
        })
        .then((blob) => {
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `spvt_vyvozka_${date === "all" ? "all" : date}.csv`;
          link.click();
          URL.revokeObjectURL(link.href);
        })
        .catch((err) => showError(errorBox, err.message));
    });

    document.getElementById("reset-btn").addEventListener("click", async () => {
      if (isAllTimeMode()) {
        showError(errorBox, "Укажите дату смены для сброса попыток.");
        return;
      }
      const date = formatDateParam();
      const okBulkReset = await confirmDialog({
        title: "Сбросить все попытки?",
        message: `За дату ${date} будут удалены все попытки за смену. Работники смогут пройти тесты заново.`,
        confirmText: "Сбросить",
        cancelText: "Отмена",
        danger: true,
      });
      if (!okBulkReset) return;
      try {
        const res = await fetch(`/api/manager/reset-attempt?shift_date=${encodeURIComponent(date)}`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "Ошибка сброса");
        alert(data.message || "Готово");
        await loadDashboard();
      } catch (err) {
        showError(errorBox, err.message);
      }
    });

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    loadManagerTests(token, errorBox).catch((err) => showError(errorBox, err.message));
    loadDashboard().catch((err) => showError(errorBox, err.message));
  </script>
</body>
</html>
