<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPVT — Тестирование</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge">Работник</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem" id="user-name">Тестирование</h1>
      </div>
      <button class="btn btn-secondary" id="logout-btn" type="button">Выйти</button>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>
    <div id="loading" class="card">Загрузка...</div>

    <div id="already-done" class="card hidden">
      <h2>Тест на сегодня уже пройден</h2>
      <p id="done-message" class="subtitle"></p>
    </div>

    <div id="test-screen" class="hidden">
      <div class="card">
        <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
        <p class="subtitle" id="question-counter"></p>
        <h2 id="question-text"></h2>
        <div id="options"></div>
        <button class="btn btn-primary" id="next-btn" type="button" disabled>Далее</button>
      </div>
    </div>

    <div id="result-screen" class="card hidden">
      <h2 id="result-title">Результат</h2>
      <p id="result-message"></p>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    const token = getToken();
    const role = localStorage.getItem("spvt_role");
    if (!token || role !== "worker") location.href = "/";

    document.getElementById("user-name").textContent = localStorage.getItem("spvt_full_name") || "Работник";
    document.getElementById("logout-btn").addEventListener("click", () => {
      clearSession();
      location.href = "/";
    });

    const errorBox = document.getElementById("error-box");
    const loadingEl = document.getElementById("loading");
    const testScreen = document.getElementById("test-screen");
    const alreadyDone = document.getElementById("already-done");
    const resultScreen = document.getElementById("result-screen");

    let questions = [];
    let currentIndex = 0;
    const answers = new Map();
    let selectedAnswer = null;

    function renderQuestion() {
      const q = questions[currentIndex];
      selectedAnswer = answers.get(q.id) || null;
      document.getElementById("question-counter").textContent =
        `Вопрос ${currentIndex + 1} из ${questions.length}`;
      document.getElementById("question-text").textContent = q.text;
      document.getElementById("progress-bar").style.width =
        `${((currentIndex) / questions.length) * 100}%`;

      const optionsEl = document.getElementById("options");
      optionsEl.innerHTML = "";
      q.options.forEach((option) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option" + (selectedAnswer === option ? " selected" : "");
        btn.textContent = option;
        btn.addEventListener("click", () => {
          selectedAnswer = option;
          answers.set(q.id, option);
          [...optionsEl.children].forEach((el) => el.classList.remove("selected"));
          btn.classList.add("selected");
          document.getElementById("next-btn").disabled = false;
        });
        optionsEl.appendChild(btn);
      });

      document.getElementById("next-btn").disabled = !selectedAnswer;
      document.getElementById("next-btn").textContent =
        currentIndex === questions.length - 1 ? "Завершить тест" : "Далее";
    }

    async function submitTest() {
      const payload = {
        answers: questions.map((q) => ({
          question_id: q.id,
          answer: answers.get(q.id),
        })),
      };
      const result = await API.post("/api/test/submit", token, payload);
      testScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      document.getElementById("result-title").textContent =
        result.passed ? "Допущен к работе" : "Не допущен к работе";
      document.getElementById("result-message").textContent = result.message;
      resultScreen.classList.toggle("alert-success", result.passed);
      resultScreen.classList.toggle("alert-error", !result.passed);
    }

    document.getElementById("next-btn").addEventListener("click", async () => {
      hideError(errorBox);
      if (!selectedAnswer) return;
      if (currentIndex < questions.length - 1) {
        currentIndex += 1;
        renderQuestion();
        return;
      }
      document.getElementById("next-btn").disabled = true;
      try {
        await submitTest();
      } catch (err) {
        showError(errorBox, err.message);
        document.getElementById("next-btn").disabled = false;
      }
    });

    async function init() {
      try {
        const status = await API.get("/api/test/status", token);
        loadingEl.classList.add("hidden");

        if (status.has_attempt && status.status !== "in_progress") {
          alreadyDone.classList.remove("hidden");
          const label = statusLabel(status.status).text;
          document.getElementById("done-message").textContent =
            `Статус: ${label}. Результат: ${status.score_percent}%`;
          return;
        }

        questions = await API.get("/api/test/questions", token);
        if (!questions.length) {
          showError(errorBox, "Вопросы не найдены");
          return;
        }
        testScreen.classList.remove("hidden");
        renderQuestion();
      } catch (err) {
        loadingEl.classList.add("hidden");
        showError(errorBox, err.message);
      }
    }

    init();
  </script>
</body>
</html>
