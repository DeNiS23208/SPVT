<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPVT — Выбор теста</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge badge-position" id="user-badge">Работник</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem" id="user-name">Выбор теста</h1>
        <p class="subtitle" style="margin:6px 0 0">Выберите тест для прохождения на сегодня</p>
      </div>
      <button class="btn btn-secondary" id="logout-btn" type="button">Выйти</button>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>
    <div id="loading" class="card">Загрузка тестов...</div>

    <div id="tests-screen" class="hidden">
      <div id="tests-grid" class="tests-grid"></div>
    </div>
  </div>

  <script src="/static/js/app.js?v=21"></script>
  <script src="/static/js/site_settings.js?v=21"></script>
  <script src="/static/js/worker_hub.js?v=22"></script>
</body>
</html>
