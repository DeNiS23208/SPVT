<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>SPVT — Вопросы теста</title>
  <link rel="stylesheet" href="/static/css/style.css?v=30">
</head>
<body class="page-manager">
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge">Администратор</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem" id="page-title">Вопросы теста</h1>
        <p class="subtitle" style="margin:6px 0 0" id="test-subtitle"></p>
      </div>
      <div class="topbar-actions">
        <button type="button" id="export-excel-btn" class="btn btn-primary">Выгрузить в Excel</button>
        <a class="btn btn-secondary" href="/manager">← К кабинету</a>
      </div>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>
    <div id="success-box" class="alert alert-success hidden"></div>

    <div class="card">
      <div class="tickets-toolbar">
        <div>
          <h2 style="margin:0 0 4px;font-size:1.1rem">Билеты</h2>
          <p class="subtitle" style="margin:0">Каждый билет — набор вопросов. Раскройте билет, чтобы добавить и редактировать вопросы.</p>
        </div>
        <button type="button" id="add-ticket-btn" class="btn btn-primary">+ Добавить билет</button>
      </div>
      <div id="tickets-list" class="tickets-list"></div>
      <p id="tickets-empty" class="subtitle tickets-empty hidden">Пока нет билетов. Нажмите «Добавить билет».</p>
    </div>
  </div>

  <script src="/static/js/app.js?v=28"></script>
  <script src="/static/js/manager_test_questions.js?v=28"></script>
</body>
</html>
