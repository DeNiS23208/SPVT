<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPVT — Тестирование</title>
  <link rel="stylesheet" href="/static/css/style.css?v=17">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge badge-position" id="user-badge">Работник</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem" id="test-title">Тестирование</h1>
      </div>
      <button class="btn btn-secondary" id="back-btn" type="button">К выбору тестов</button>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>
    <div id="loading" class="card">Загрузка...</div>

    <div id="already-done" class="card hidden">
      <h2>Тест на сегодня уже пройден</h2>
      <p id="done-message" class="subtitle"></p>
      <button class="btn btn-secondary" id="done-back-btn" type="button" style="margin-top:16px">К выбору тестов</button>
    </div>

    <div id="test-screen" class="hidden">
      <div class="card">
        <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
        <p class="subtitle" id="question-counter"></p>
        <h2 id="question-text"></h2>
        <div id="options"></div>
        <button class="btn btn-primary" id="next-btn" type="button" disabled>Далее</button>
      </div>
    </div>

    <div id="result-screen" class="card hidden">
      <h2 id="result-title">Результат</h2>
      <p id="result-message"></p>
      <button class="btn btn-primary" id="result-back-btn" type="button" style="margin-top:16px">К выбору тестов</button>
    </div>
  </div>

  <script src="/static/js/app.js?v=17"></script>
  <script src="/static/js/site_settings.js?v=17"></script>
  <script src="/static/js/worker_test.js?v=17"></script>
</body>
</html>
