<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPVT — Новый тест</title>
  <link rel="stylesheet" href="/static/css/style.css?v=30">
</head>
<body class="page-manager">
  <div class="container">
    <div class="topbar">
      <div>
        <div class="badge">Администратор</div>
        <h1 style="margin:8px 0 0;font-size:1.3rem">Новый тест</h1>
      </div>
      <a class="btn btn-secondary" href="/manager">← К кабинету</a>
    </div>

    <div id="error-box" class="alert alert-error hidden"></div>

    <div class="card">
      <p class="subtitle" style="margin:0 0 20px">Укажите название и описание — тест появится у работников на экране выбора.</p>
      <form id="test-form" class="login-form">
        <div class="form-field">
          <label for="test-title">Название теста <span class="field-required">*</span></label>
          <input id="test-title" type="text" required maxlength="128" placeholder="Например: Тест по ГНВП" autocomplete="off">
        </div>
        <div class="form-field">
          <label for="test-description">Описание теста <span class="field-required">*</span></label>
          <textarea id="test-description" required maxlength="2000" rows="4" placeholder="Кратко: о чём тест и для кого"></textarea>
        </div>
        <button class="btn btn-primary btn-login" type="submit" id="save-btn">Создать тест</button>
      </form>
    </div>
  </div>

  <script src="/static/js/app.js?v=16"></script>
  <script src="/static/js/manager_test_new.js?v=16"></script>
</body>
</html>
