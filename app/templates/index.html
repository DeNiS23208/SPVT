<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ИНК-СЕРВИС — Предвахтовое тестирование</title>
  <link rel="stylesheet" href="/static/css/style.css?v=12">
  <link rel="preload" as="image" href="{{ site.hero_background_url }}" fetchpriority="high">
  <link rel="preload" as="image" href="{{ site.logo_url }}" fetchpriority="high">
  <style id="server-site-paint">
    :root { --accent: {{ site.accent_color }}; }
    body.page-home {
      background:
        linear-gradient(rgba(8, 18, 32, {{ hero_top }}), rgba(8, 18, 32, {{ hero_bottom }})),
        url("{{ site.hero_background_url }}") center center / cover no-repeat fixed;
      background-color: #0b1220;
    }
  </style>
</head>
<body class="page-home" data-hero-url="{{ site.hero_background_url }}" data-logo-url="{{ site.logo_url }}">
  <div class="home-shell">
    <div class="container home-main">
      <header class="header home-header">
        <h1>{{ site.site_title }}</h1>
        <p class="subtitle">{{ site.site_subtitle }}</p>
      </header>

      <div class="card login-card">
        <div class="login-card-head">
          <h2>Вход в систему</h2>
          <p class="login-card-lead">Выберите подразделение и своё ФИО — пароль единый для всех сотрудников.</p>
        </div>

        <div id="login-error" class="alert alert-error hidden"></div>

        <div id="worker-login-block" class="login-form">
          <div class="form-field">
            <label for="department">Подразделение</label>
            <div class="select-wrap">
              <select id="department" autocomplete="organization">
                <option value="">Выберите подразделение</option>
              </select>
            </div>
          </div>

          <div class="form-field">
            <label for="employee">Сотрудник</label>
            <div class="select-wrap">
              <select id="employee" disabled>
                <option value="">Сначала выберите подразделение</option>
              </select>
            </div>
            <p class="login-hint" id="dept-hint">Сначала укажите подразделение, затем выберите своё ФИО.</p>
          </div>

          <div class="form-field form-field-muted">
            <label for="username">Логин (подставится автоматически)</label>
            <input id="username" type="text" readonly tabindex="-1" placeholder="—">
          </div>
        </div>

        <div id="login-help-block" class="login-form hidden">
          <div class="form-field">
            <label for="help-fio">Фамилия, имя, отчество</label>
            <input id="help-fio" type="text" autocomplete="name" placeholder="Например: Иванов Сергей Петрович">
          </div>
          <button type="button" id="help-search-btn" class="btn btn-secondary btn-help-search">Найти</button>
          <div id="help-pick-block" class="hidden">
            <div class="form-field">
              <label for="help-department">Ваше подразделение</label>
              <div class="select-wrap">
                <select id="help-department" disabled>
                  <option value="">Выберите подразделение</option>
                </select>
              </div>
            </div>
            <div id="help-employee-field" class="form-field hidden">
              <label for="help-employee">Уточните, кто вы</label>
              <div class="select-wrap">
                <select id="help-employee" disabled>
                  <option value="">Выберите себя в списке</option>
                </select>
              </div>
            </div>
          </div>
          <p class="login-hint" id="help-hint">Введите фамилию и имя — мы покажем подразделения, где есть совпадения.</p>
        </div>

        <div class="form-field">
          <label for="password">Пароль</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Введите пароль">
        </div>

        <button id="login-btn" class="btn btn-primary btn-login" type="button">Войти</button>

        <button type="button" id="login-help-open" class="login-staff-toggle">Не нашёл себя?</button>
        <button type="button" id="login-help-close" class="login-staff-toggle login-staff-toggle-muted hidden">Вернуться к обычному входу</button>
      </div>
    </div>

    <aside class="home-logo-panel" aria-label="Логотип">
      <div class="logo-shine">
        <img class="site-logo" src="{{ site.logo_url }}?v=10" alt="ИНК-СЕРВИС">
      </div>
    </aside>
  </div>

  <script src="/static/js/app.js?v=12"></script>
  <script src="/static/js/site_settings.js?v=12"></script>
  <script src="/static/js/login.js?v=13"></script>
</body>
</html>
